resilience4j:
  # 限流器配置
  ratelimiter:
    instances:
      paymentService:
        limitRefreshPeriod: 1s          # 令牌刷新周期：1秒
        limitForPeriod: 5               # 每周期5个令牌 → QPS=5
        timeoutDuration: 0              # 无令牌立即失败，不等待

  # 舱壁隔离配置（信号量模式）
  bulkhead:
    instances:
      paymentService:
        maxConcurrentCalls: 10          # 最大并发数
        maxWaitDuration: 0              # 无可用资源立即拒绝

  # 熔断器配置
  circuitbreaker:
    instances:
      paymentService:
        slidingWindowSize: 10           # 滑动窗口大小（10次调用）
        slidingWindowType: COUNT_BASED  # 基于请求次数统计
        failureRateThreshold: 50        # 失败率阈值50%
        waitDurationInOpenState: 10s    # 熔断开启持续时间
        permittedNumberOfCallsInHalfOpenState: 3  # 半开状态允许的试探请求数
        minimumNumberOfCalls: 5         # 最少请求数（低于此值不熔断）

  # 重试配置
  retry:
    instances:
      paymentService:
        maxAttempts: 3                  # 最大重试次数（含首次）
        waitDuration: 500ms             # 重试间隔
        retryExceptions: # 触发重试的异常类型
          - java.io.IOException
          - org.springframework.web.client.HttpServerErrorException

  # 超时配置
  timelimiter:
    instances:
      paymentService:
        timeoutDuration: 3s             # 超时时间3秒
        cancelRunningFuture: true       # 超时后取消执行