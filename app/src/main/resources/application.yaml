# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 9999
  servlet:
    # 应用的访问路径
    context-path: /dayplan
    # 编码配置
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 100
    threads:
      # tomcat最大线程数，默认为200
      max: 200
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 10
    # 连接超时（毫秒）
    connection-timeout: 30000

# Spring配置
spring:
  # 项目名称
  application:
    name: app
  jackson:
    # 日期格式
    date-format: yyyy-MM-dd HH:mm:ss
    # 时区
    time-zone: GMT+8
    # 默认属性包含策略
    default-property-inclusion: non_null
    # 序列化配置
    serialization:
      # 日期不转时间戳
      write-dates-as-timestamps: false
      # 枚举转字符串
      write-enums-using-to-string: true
    # 反序列化配置
    deserialization:
      # 忽略未知属性(不报错，直接忽略)
      fail-on-unknown-properties: false
  # Spring MVC 参数绑定格式（GET 请求参数）
  mvc:
    format:
      date-time: yyyy-MM-dd HH:mm:ss
      date: yyyy-MM-dd
      time: HH:mm:ss
  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

  # mysql配置
  datasource:
    url: jdbc:mysql://115.159.42.54:3306/dayplan?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&cachePrepStmts=true&rewriteBatchedStatements=true
    username: root
    password: tR5sW8yB3eH6qM9c
  # redis配置
  data:
    redis:
      host: 115.159.42.54
      port: 6379
      password: pR2mK9sV4tX6bQ8z
      database: 0
      timeout: 5s

mybatis-plus:
  # 配置文件的位置
  # config-location: classpath:/mybatis-config.xml
  # Mapper 对应的 XML 文件位置
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    # 开启自动驼峰命名
    map-underscore-to-camel-case: true
    # 打印SQL日志到控制台
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    # 关闭启动图标
    banner: false

# 数据加解密配置
encryptor-data:
  enable: true              # 是否开启功能
  algorithm: SM4            # 默认算法: BASE64, SM4
  encode: BASE64            # 编码方式: BASE64
  password: your-secret-key-here-16     # 对称加密(SM4)的秘钥，16/24/32位
  # publicKey: 你的公钥      # 非对称加密(SM2)时使用
  # privateKey: 你的私钥     # 非对称加密(SM2)时使用

# 接口加解密配置
encryptor-api:
  enabled: true              # 是否开启功能
  headerFlag: encryptor-key # 加密头标识
  # 响应加密公钥 非对称算法的公私钥 如：SM2 使用者请自行更换
  publicKey: MFwwDQYJKoZIhvcNAQEBBQADSwAwSAJBAJnNwrj4hi/y3CCJu868ghCG5dUj8wZK++RNlTLcXoMmdZWEQ/u02RgD5LyLAXGjLOjbMtC+/J9qofpSGTKSx/MCAwEAAQ==
  # 请求解密私钥 非对称算法的公私钥 如：SM2 使用者请自行更换
  privateKey: 
  includePaths: # 可选：Filter 拦截的 URL 模式（默认 "/*"）
    - /api/**
  excludePaths: # 可选：排除路径（支持 Ant 风格）
    - /api/public/**

logging:
  level:
    com.xiyao: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{traceId}] %-5level [%thread] %logger{36} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{traceId}] %-5level [%thread] %logger{36} - %msg%n'
  file:
    name: ./logs/app.log
