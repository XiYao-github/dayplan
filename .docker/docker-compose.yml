services:
  # MySQL数据库服务
  mysql:
    # MySQL 8.0官方镜像
    image: mysql:8.0
    # 容器名称
    container_name: mysql
    # 环境变量配置
    environment:
      # MySQL root用户密码，使用环境变量或默认为"root"
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      # 创建默认数据库，使用环境变量或默认为"test"
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      # 设置字符集，使用环境变量或默认为"utf8mb4"
      MYSQL_CHARSET: ${MYSQL_CHARSET}
      # 创建的普通用户名
      MYSQL_USER: ${MYSQL_USER}
      # 普通用户密码
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    # 数据卷挂载配置
    volumes:
      # 将本地的./mysql/data目录挂载到容器的/var/lib/mysql，用于数据持久化
      - ./mysql/data:/var/lib/mysql
      # 将本地的./mysql/logs目录挂载到容器的/var/log/mysql，用于日志持久化
      - ./mysql/logs:/var/log/mysql
      # 将本地的./mysql/conf目录挂载到容器的/etc/mysql/conf.d，只读方式，用于自定义配置
      - ./mysql/conf:/etc/mysql/conf.d:ro
    # 端口映射配置
    ports:
      # 将容器的3306端口映射到宿主机的3306端口
      - "3306:3306"
    # 网络配置
    networks:
      # 将容器连接到名为network的自定义网络
      - network
    # 重启策略：除非手动停止，否则总是重启
    restart: unless-stopped

  # Redis缓存服务定义开始
  redis:
    # 使用Redis 7的Alpine轻量版本镜像
    image: redis:7-alpine
    # 容器名称设为redis
    container_name: redis
    # 容器启动时执行的命令
    command: redis-server --requirepass ${REDIS_PASSWORD}
    # 数据卷挂载配置
    volumes:
      # 将本地的./redis/data目录挂载到容器的/data，用于数据持久化
      - ./redis/data:/data
    # 端口映射配置
    ports:
      # 将容器的6379端口映射到宿主机的6379端口
      - "6379:6379"
    # 网络配置
    networks:
      # 将容器连接到名为network的自定义网络
      - network
    # 重启策略：除非手动停止，否则总是重启
    restart: unless-stopped

  # Nginx Web服务器定义开始
  nginx:
    # 使用Nginx的稳定Alpine版本镜像
    image: nginx:stable-alpine
    # 容器名称设为nginx
    container_name: nginx
    # 数据卷挂载配置
    volumes:
      # 将本地的nginx主配置文件挂载到容器内，只读方式
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      # 将本地的虚拟主机配置目录挂载到容器内，只读方式
      - ./nginx/conf/conf.d:/etc/nginx/conf.d:ro
      # 将本地的网站文件目录挂载到nginx的默认网站目录
      - ./nginx/html:/usr/share/nginx/html
      # 将本地的日志目录挂载到容器内，用于日志持久化
      - ./nginx/logs:/var/log/nginx
      # 将本地的SSL证书目录挂载到容器内，只读方式，用于HTTPS配置
      - ./nginx/ssl:/etc/nginx/ssl:ro
    # 端口映射配置
    ports:
      # 将容器的80端口映射到宿主机的80端口，用于HTTP访问
      - "80:80"
      # 将容器的443端口映射到宿主机的443端口，用于HTTPS访问
      - "443:443"
    # 网络配置
    networks:
      # 将容器连接到名为network的自定义网络
      - network
    # 重启策略：除非手动停止，否则总是重启
    restart: unless-stopped
    # 依赖关系配置：确保nginx服务在mysql和redis服务启动后才启动
    depends_on:
      - mysql
      - redis

# 自定义网络配置部分
networks:
  # 定义名为network的网络
  network:
    # 使用bridge驱动，这是Docker默认的网络驱动
    driver: bridge