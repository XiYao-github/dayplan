# ============================================
# Docker Compose 服务编排文件
# 定义如何启动、运行、连接各个容器
# ============================================

services:
  # ------------------------------
  # 应用服务
  # ------------------------------
  app:
    # -------- 镜像构建配置 --------
    # context：构建上下文，"." 表示当前目录（Dockerfile 所在目录）
    # dockerfile：指定使用的 Dockerfile 文件名
    # args：传递给 Dockerfile 的构建参数
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT_NAME: ${PROJECT_NAME}

    # -------- 容器命名 --------
    # container_name：容器名称，${PROJECT_NAME} 来自 start.sh 自动获取的文件夹名
    container_name: ${PROJECT_NAME}

    # -------- 环境变量配置 --------
    # JAVA_OPTS：JVM 运行参数，从 .env 读取
    #   -Xms512m：初始堆内存
    #   -Xmx1g：最大堆内存
    #   -XX:+UseG1GC：使用 G1 垃圾回收器（低延迟）
    environment:
      - JAVA_OPTS=${JAVA_OPTS}

    # -------- 端口映射 --------
    # 格式："宿主机端口:容器端口"
    # ${PORT} 从 .env 读取（如 9999）
    ports:
      - "${PORT}:${PORT}"

    # -------- 数据卷挂载（持久化）--------
    # 将宿主机目录挂载到容器内，实现日志持久化
    # ./logs：项目根目录下的 logs 文件夹（会自动创建）
    # /app/logs：Spring Boot 输出的日志目录
    volumes:
      - ./logs:/app/logs

    # -------- 资源限制 --------
    # deploy.resources.limits.memory：容器最大可用内存
    # 建议比 JVM 最大堆内存（-Xmx）大一些，因为还有元空间、线程栈等开销
    deploy:
      resources:
        limits:
          memory: ${MEMORY}

    # -------- 重启策略 --------
    # unless-stopped：除非手动停止，否则容器退出时自动重启
    #   - 适合长期运行的服务
    #   - 服务器重启后也会自动启动
    # 其他选项：no（不重启）、always（总是重启）、on-failure（失败时重启）
    restart: unless-stopped

    # -------- 日志配置 --------
    # driver：日志驱动，json-file 是 Docker 默认驱动
    # max-size：单个日志文件最大 50MB
    # max-file：最多保留 3 个日志文件（超出则轮转删除旧的）
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

# ------------------------------
# 网络配置
# ------------------------------
# 使用外部网络 networks，与 MySQL、Redis、Nginx 等基础服务网络互通
# 注意：该网络需要提前创建：docker network create networks
networks:
  default:
    external:
      name: networks